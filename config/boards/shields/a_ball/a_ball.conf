# Enable BLE
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=n

# Disable keyboard scanning
CONFIG_ZMK_KEYBOARD=n
CONFIG_ZMK_KSCAN_GPIO=n

# Enable PMW3360 sensor
CONFIG_ZMK_SENSOR_PMW3360=y
CONFIG_ZMK_SENSOR_PMW3360_SPI_DEV="SPI_1"

# Optional: set default DPI or sensitivity
CONFIG_ZMK_SENSOR_PMW3360_DEFAULT_CPI=800
